[build]
  publish = "."

# Exception: the live comment-count feed for the Public Comment CTA must be
# fetchable client-side. Listed BEFORE the /data/* block so it wins (first match).
[[redirects]]
  from = "/data/comment-counts.json"
  to = "/data/comment-counts.json"
  status = 200

[[redirects]]
  from = "/data/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/template/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/scripts/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/index/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/.claude/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/vision/*"
  to = "/"
  status = 404
  force = true

# Workspace-only marketing / social post drafts — never served.
[[redirects]]
  from = "/marketing/*"
  to = "/"
  status = 404
  force = true

# Internal project docs kept at the repo root — block from serving.
# (LICENSE and README.md stay public by convention.)
[[redirects]]
  from = "/CLAUDE.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/claude-code-spec.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/follow-the-money-roadmap.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/follow-the-money-vision.md"
  to = "/"
  status = 404
  force = true

# Unpublished drafts — built from templates, pending human data verification.
# Left servable (so Netlify Deploy Previews can render them for review) but
# never indexed, and kept unlinked from index.html / sitemap.xml. Before
# publishing: verify the data, then move the folder to /puzzles/{slug}/.
[[headers]]
  for = "/drafts/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Password-protected Review Desk (AES-encrypted page for outside reviewers;
# built by scripts/build-review-desk.py + scripts/encrypt-page.mjs). Servable
# so its DONE button can submit the review-desk-done Netlify Form, but never
# indexed and never linked from the site.
[[headers]]
  for = "/review/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
