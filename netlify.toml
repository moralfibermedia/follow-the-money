[build]
  publish = "."

# Exception: the live comment-count feed for the Public Comment CTA must be
# fetchable client-side. Listed BEFORE the /data/* block so it wins (first match).
[[redirects]]
  from = "/data/comment-counts.json"
  to = "/data/comment-counts.json"
  status = 200

[[redirects]]
  from = "/data/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/template/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/scripts/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/index/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/.claude/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/vision/*"
  to = "/"
  status = 404
  force = true
